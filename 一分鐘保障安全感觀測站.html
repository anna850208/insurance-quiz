<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財務地基大檢測</title>
    <style>
        :root {
            --primary-color: #FF8A80;
            --primary-hover: #FF5252;
            --bg-color: #FFF9F6;
            --card-bg: #FFFFFF;
            --text-color: #4A4A4A;
            --line-green: #06C755;
            --line-green-hover: #05B34B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        img.stage-img {
            width: 100%;
            max-height: 280px;
            object-fit: contain;
            margin-bottom: 24px;
            border-radius: 16px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #333;
        }

        p.desc {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 24px;
        }

        /* 答案選項按鈕 */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(255, 138, 128, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 82, 82, 0.4);
        }

        .btn-option {
            background-color: #FFF0EB;
            color: #E64A19;
            border: 2px solid #FFCCBC;
            box-shadow: none;
        }

        .btn-option:hover {
            background-color: #FFCCBC;
            color: #D84315;
            border-color: #FF8A80;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255, 138, 128, 0.15);
        }

        /* LINE 按鈕樣式 */
        .btn-line {
            background-color: var(--line-green);
            box-shadow: 0 4px 10px rgba(6, 199, 85, 0.3);
            margin-top: 15px;
        }

        .btn-line:hover {
            background-color: var(--line-green-hover);
            box-shadow: 0 6px 15px rgba(6, 199, 85, 0.5);
            transform: translateY(-2px);
        }

        /* 進度條 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #F0F0F0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .hide {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <!-- 開始畫面 -->
    <div id="start-screen" class="fade-in">
        <img src="1.png" alt="開始畫面" class="stage-img">
        <h1>築夢未來：妳的專屬財務診斷</h1>
        <p class="desc">歡迎來到財務地基檢測！只需花 2 分鐘回答 6 個生活場景問題，就能幫妳健檢財務體質，找出最適合妳的資產配置方向。</p>
        <button class="btn" onclick="startGame()">立即開始測驗</button>
    </div>

    <!-- 測驗題目畫面 -->
    <div id="quiz-screen" class="hide fade-in">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <img id="question-img" src="" alt="題目圖片" class="stage-img">
        <h1 id="question-title">題目載入中...</h1>
        <div class="options-container" id="options-container">
            <!-- 動態生成選項 -->
        </div>
    </div>

    <!-- 測驗結果畫面 -->
    <div id="result-screen" class="hide fade-in">
        <img id="result-img" src="" alt="結果圖片" class="stage-img">
        <h1 id="result-title">計算中...</h1>
        <p class="desc" id="result-desc">檢測分析結果</p>
        
        <!-- 引導至 LINE 官方帳號 -->
        <a id="line-link" href="https://line.me/R/ti/p/@221hssks" target="_blank" class="btn btn-line">
            💬 領取詳細分析報告 ＆ 預約諮詢
        </a>
    </div>
</div>

<script>
    // 測驗題目資料庫（使用本機檔案相對路徑）
    const questions = [
        {
            id: 1,
            image: "2.png",
            title: "Q1：如果突然發生了意外傷害，妳的第一反應是？",
            options: [
                { text: "幸好我有買意外醫療險，不用擔心醫藥費", score: { A: 3, B: 1, C: 2 } },
                { text: "慘了，這筆額外的開銷可能會卡死我下半月的預算", score: { A: 1, B: 3, C: 2 } },
                { text: "只能先刷卡分期頂著，之後再打算", score: { A: 1, B: 2, C: 3 } }
            ]
        },
        {
            id: 2,
            image: "3.png",
            title: "Q2：面對大病與醫療開支，妳最在意什麼？",
            options: [
                { text: "病房與治療品質，希望能用最好的自費藥物與耗材", score: { A: 3, B: 2, C: 1 } },
                { text: "請假期間的薪資中斷，會嚴重影響日常基本生活開銷", score: { A: 2, B: 3, C: 1 } },
                { text: "希望有一筆立即給付的整筆保險金，讓我自由規劃運用", score: { A: 2, B: 1, C: 3 } }
            ]
        },
        {
            id: 3,
            image: "4.png",
            title: "Q3：在理財與存錢上，妳習慣把錢放哪裡？",
            options: [
                { text: "放定存或活存，雖然利率低但覺得這樣最安心安全", score: { A: 1, B: 3, C: 2 } },
                { text: "穩健累積！規劃定期定額，讓資產能長期穩健增長", score: { A: 3, B: 1, C: 2 } },
                { text: "投資股票、加密貨幣，追求更高幅度的資產翻倍", score: { A: 2, B: 1, C: 3 } }
            ]
        },
        {
            id: 4,
            image: "5.jpg", // ⚠️ 注意這張圖片副檔名是 .jpg 喔！
            title: "Q4：妳夢想中的生活藍圖裡，不可或缺的是？",
            options: [
                { text: "有源源不絕的被動收入，無後顧之憂地到處出國旅行", score: { A: 3, B: 2, C: 1 } },
                { text: "能給孩子最優質的教育資源、買下溫馨舒適的家", score: { A: 2, B: 3, C: 1 } },
                { text: "能早早退休，每日隨心所欲地享受悠閒生活與興趣", score: { A: 2, B: 1, C: 3 } }
            ]
        },
        {
            id: 5,
            image: "6.png",
            title: "Q5：妳多久會重新檢視一次自己的保單與財務狀況？",
            options: [
                { text: "每年都會主動找專業顧問檢視，確保保障符合現狀", score: { A: 3, B: 1, C: 2 } },
                { text: "買了就不太管它，只有在生病需要申請理賠時才去找", score: { A: 1, B: 3, C: 2 } },
                { text: "偶爾會看看，但其實不是很確定目前的保障額度到底夠不夠", score: { A: 2, B: 2, C: 3 } }
            ]
        },
        {
            id: 6,
            image: "7.png",
            title: "Q6：對於『每個月都有穩定現金流』這件事，妳的看法是？",
            options: [
                { text: "極度渴望！這是我建立安全感與實現財務自由的關鍵", score: { A: 3, B: 2, C: 1 } },
                { text: "還好，目前靠本業薪水就足夠支應，沒特別想過", score: { A: 1, B: 3, C: 2 } },
                { text: "有在想，但不知道該怎麼利用手邊的資金去打造", score: { A: 2, B: 1, C: 3 } }
            ]
        }
    ];

    // 測驗結果資料庫（使用本機檔案相對路徑）
    const results = {
        A: {
            title: "開拓冒險家 🔭",
            image: "8.png",
            desc: "妳擁有宏觀的視野，對未來充滿無限想像！就像帶著望遠鏡探索星空的太空人一樣，妳適合專注於資產配置與中長期的財務增值。在穩固醫療地基的前提下，大膽打造妳的被動收入引擎吧！"
        },
        B: {
            title: "營造大師 🧱",
            image: "9.png",
            desc: "妳非常務實，深知一磚一瓦都需要打好底盤。就像專業的營造職人，妳看重日常的安全感與基礎醫療保障。現在最適合妳的是透過防癌、意外等防禦型保單，先把財務漏洞補好，再穩穩構築妳的黃金城堡！"
        },
        C: {
            title: "城堡守護者 🏰",
            image: "10.png",
            desc: "妳是家人與資產最溫暖的守護天使，就像盤踞在城堡上守護和平的小橘龍。妳對資產的安全度要求極高，重視安穩不變的傳承與累積。適合透過穩定、複利滾存的財務工具，在完全零風險的前提下，呵護妳與家人的美麗家園。"
        }
    };

    let currentQuestionIndex = 0;
    let scores = { A: 0, B: 0, C: 0 };

    // 開始遊戲
    function startGame() {
        document.getElementById("start-screen").classList.add("hide");
        document.getElementById("quiz-screen").classList.remove("hide");
        currentQuestionIndex = 0;
        scores = { A: 0, B: 0, C: 0 };
        showQuestion();
    }

    // 顯示題目
    function showQuestion() {
        const q = questions[currentQuestionIndex];
        
        // 更新進度條
        const progressPercent = ((currentQuestionIndex) / questions.length) * 100;
        document.getElementById("progress-fill").style.width = `${progressPercent}%`;

        // 填入題目內容
        document.getElementById("question-img").src = q.image;
        document.getElementById("question-title").innerText = q.title;

        // 生成選項按鈕
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        
        q.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "btn btn-option";
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.score);
            optionsContainer.appendChild(btn);
        });
    }

    // 選擇答案
    function selectOption(score) {
        for (let key in score) {
            scores[key] += score[key];
        }

        currentQuestionIndex++;
        
        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    // 結算並顯示結果
    function showResult() {
        document.getElementById("quiz-screen").classList.add("hide");
        document.getElementById("result-screen").classList.remove("hide");

        let highestCategory = "A";
        let maxScore = scores.A;
        if (scores.B > maxScore) {
            highestCategory = "B";
            maxScore = scores.B;
        }
        if (scores.C > maxScore) {
            highestCategory = "C";
        }

        const result = results[highestCategory];

        document.getElementById("result-img").src = result.image;
        document.getElementById("result-title").innerText = `妳的財務人格：${result.title}`;
        document.getElementById("result-desc").innerText = result.desc;
    }
</script>

</body>
</html>
