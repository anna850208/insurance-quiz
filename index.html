<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #FAF6F0; /* 溫馨燕麥奶色 */
            --card-bg: #FFFFFF;
            --text-main: #5C4B40; /* 溫暖可可深咖 */
            --text-sub: #A38F80;
            --pastel-orange: #FFEAD8;
            --pastel-blue: #E8F4F8;
            --pastel-green: #E8F5E9;
            --pastel-pink: #FFEBEE;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 16px 35px rgba(140, 126, 114, 0.08);
            padding: 30px 20px;
            max-width: 410px;
            width: 100%;
            text-align: center;
            border: 2px solid #EFEAE2;
            position: relative;
        }

        /* 頂部質感小標籤 */
        .brand-tag {
            font-size: 0.8rem;
            color: #D47A3B;
            font-weight: 700;
            margin-bottom: 18px;
            display: inline-block;
            background: linear-gradient(135deg, #FFF5EB, #FFE4D6);
            padding: 5px 16px;
            border-radius: 50px;
            border: 1px solid #FCD4BD;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.4rem; 
            margin-top: 5px; 
            margin-bottom: 20px;
            font-weight: 900;
            line-height: 1.4;
        }

        /* 
           【純 CSS 打造 Q版粉彩插畫舞台】
           完全不使用 img 標籤與外部網址，利用幾何重疊，呈現超可愛手帳風格
        */
        .illustration-stage {
            width: 100%;
            height: 150px;
            border-radius: 20px;
            margin-bottom: 22px;
            background: #FFFDFC;
            border: 2px dashed #FFD09B;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 插卡背景 */
        .deco-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--pastel-orange);
            z-index: 1;
            opacity: 0.7;
        }

        /* 主體大圖示（有陰影與浮動動效） */
        .main-avatar {
            font-size: 4.2rem;
            z-index: 2;
            filter: drop-shadow(0 8px 12px rgba(220, 150, 100, 0.15));
            animation: gentleFloat 3.5s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.05); }
        }

        /* Q版圓滾滾按鈕 */
        .btn {
            background: linear-gradient(135deg, #FFB03A, #FF8C00);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.05rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(255, 140, 0, 0.2);
            border-bottom: 4px solid #E06C00;
        }
        
        .btn:active { 
            transform: translateY(3px);
            border-bottom-width: 1px;
            box-shadow: 0 2px 5px rgba(255, 140, 0, 0.1);
        }

        /* 可愛手帳感選項 */
        .option-btn {
            background: #FFFFFF;
            color: var(--text-main);
            border: 1.5px solid #EFEAE2;
            padding: 16px 18px;
            margin: 10px 0;
            width: 100%;
            border-radius: 18px;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
            line-height: 1.4;
            box-shadow: 0 4px 0px #F5EFE6;
        }

        .option-btn:active, .option-btn:hover {
            background-color: #FFFDF9;
            border-color: #FF8C00;
            color: #FF8C00;
            transform: translateY(2px);
            box-shadow: 0 2px 0px #FF8C00;
        }

        .hidden { display: none; }

        /* 進度條 */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
        }
        .progress-bar-bg {
            height: 8px;
            background-color: #F5EFE6;
            border-radius: 10px;
            width: 80%;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFB870, #FF8C00);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #FF8C00;
            font-weight: 700;
        }

        .intro-text {
            line-height: 1.6;
            color: var(--text-main);
            font-size: 0.92rem;
            margin-top: 5px;
            margin-bottom: 15px;
            text-align: left;
            background: #FFFDF9;
            padding: 16px;
            border-radius: 18px;
            border: 1px dashed #FFD09B;
        }

        .result-box {
            text-align: left;
            background: #FFFDFB;
            padding: 18px;
            border-radius: 18px;
            border: 2px dashed #FFD2A6;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .footer-text {
            font-size: 0.72rem;
            color: var(--text-sub);
            margin-top: 25px;
            border-top: 1px dashed #EFEAE2;
            padding-top: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- 開始畫面 -->
    <div id="start-screen">
        <span class="brand-tag">🍊 芝心人生夥伴 療癒企劃</span>
        <h1>安全感防禦人格檢測</h1>
        
        <div class="illustration-stage">
            <div class="deco-circle" style="background-color: #FFEAD8;"></div>
            <div class="main-avatar">🏡✨</div>
        </div>

        <div class="intro-text">
            嗨！我是你的財務地基診斷師<b>芝心</b> 🍊<br><br>
            你對未來的安全防護，到底是像銅牆鐵壁一樣讓人安心，還是像精緻的蕾絲一樣一碰就透？<br><br>
            花一分鐘，跟著超療癒的 Q 版插畫卡，測出你專屬的「防禦人格」吧！
        </div>
        <button class="btn" onclick="startQuiz()">出發測驗 🚀</button>
        <div class="footer-text">© 芝心人生夥伴 | 陪你築起最穩固的財務地基</div>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress-bar-bg"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-number" class="progress-text">1/6</span>
        </div>
        
        <div class="illustration-stage">
            <!-- 圓形粉彩背景與主體圖示 -->
            <div id="quiz-bg" class="deco-circle"></div>
            <div id="quiz-avatar" class="main-avatar">❓</div>
        </div>

        <h3 id="question-text" style="margin-bottom: 15px; line-height: 1.5; font-size: 1rem; text-align: left; padding: 0 5px;">載入中...</h3>
        <div id="options-container"></div>
        <div class="footer-text">芝心陪著你，別緊張唷 🍊</div>
    </div>

    <!-- 結果畫面 -->
    <div id="result-screen" class="hidden">
        <span class="brand-tag">🍊 芝心人生夥伴 診斷報告</span>
        <h2 style="color: var(--text-sub); margin-bottom: 5px; font-size: 0.9rem; font-weight: 500;">你專屬的防禦人格是</h2>
        <h1 id="result-title" style="font-size: 1.8rem; margin-top: 5px; margin-bottom: 15px; color: #FF8C00;">計算中...</h1>
        
        <div class="illustration-stage">
            <div id="result-bg" class="deco-circle"></div>
            <div id="result-avatar" class="main-avatar">✨</div>
        </div>

        <div id="result-desc" class="result-box"></div>
        
        <!-- LINE 導流按鈕 -->
        <a id="line-link" href="#" target="_blank" style="text-decoration: none;">
            <button class="btn" style="background: linear-gradient(135deg, #02b348, #06C755); border-bottom: 4px solid #009933; box-shadow: 0 6px 15px rgba(6, 199, 85, 0.25);">
                💬 敲「芝心」聊聊我的人格秘密
            </button>
        </a>
        <div class="footer-text">想微調保障或聊聊月月被動收入？找芝心就對啦！</div>
    </div>
</div>

<script>
    // 透過 CSS 圓形色塊與內建精緻繪文字重疊，保證 100% 絕對顯示
    const questions = [
        { 
            q: "Q1. 走在路上不幸踢到鐵板骨折，躺在醫院病床上時，你的大腦第一時間在想...", 
            avatar: "🤕🩹",
            bgColor: "#FFEBEE", // 粉紅色系
            options: [
                { text: "😢 完了，聽說單人房一天要貼好幾千，我還是去睡健保房或走廊好了...", score: 1 }, 
                { text: "😎 沒差，我有保險神隊友！給我來一間陽光灑落的單人房！", score: 0 }
            ] 
        },
        { 
            q: "Q2. 醫生遞過來一張同意書，建議你自費 20 萬做最新型微創手術，你第一眼盯著看的是...", 
            avatar: "🩺📋",
            bgColor: "#E8F4F8", // 粉藍色系
            options: [
                { text: "😨 那排晃眼的『金額欄』...想問醫生有沒有健保全額給付的傳統手術？", score: 1 }, 
                { text: "💳 當然是『傷口小、恢復快』的說明！反正有實支實付，健康第一！", score: 0 }
            ] 
        },
        { 
            q: "Q3. 剛領完薪水，看著自己戶頭裡那筆「未來教育/買房基金」，你會如何管理它？", 
            avatar: "🐷🪙",
            bgColor: "#FFF3E0", // 粉黃色系
            options: [
                { text: "🏦 放在一般帳戶隨時會被我不小心刷掉，甚至被通膨默默吃掉...", score: 1 }, 
                { text: "🔒 鎖在有穩定增值、強迫儲蓄的年金險或專屬帳戶，誰都別想動它！", score: 0 }
            ] 
        },
        { 
            q: "Q4. 提到「為自己規劃被動收入與退休生活」，你最真實的現狀是...", 
            avatar: "🌴☕",
            bgColor: "#E8F5E9", // 粉綠色系
            options: [
                { text: "💭 有打算啦...但每個月卡費 and 生活開銷扣完，就打算下個月再說了。", score: 1 }, 
                { text: "📈 有在實施中！無論是定期定額還是儲蓄型年金，默默在蓋財務地基！", score: 0 }
            ] 
        },
        { 
            q: "Q5. 突然驚覺身邊好幾個朋友都開始做健康檢查、甚至有人生病，你的反應是...", 
            avatar: "🔍🛡️",
            bgColor: "#F3E5F5", // 粉紫色系
            options: [
                { text: "🫣 鴕鳥心態，不敢看自己的健康和保障，深怕看到赤裸裸的缺口。", score: 1 }, 
                { text: "🛡️ 預防勝於治療，定期把現有保障拉出來健檢，跟上最新醫療水準！", score: 0 }
            ] 
        },
        { 
            q: "Q6. 對於「財務自由」這四個字，你腦海中浮現的終極浪漫畫面是...", 
            avatar: "🌻☀️",
            bgColor: "#FFF9C4", // 亮黃色系
            options: [
                { text: "🍟 點麥當勞直接升級大薯，不用看價錢就覺得很爽了！", score: 1 }, 
                { text: "🏡 退休後每個月有一筆「穩定的現金流」自動入帳，天天自然醒！", score: 2 }
            ] 
        }
    ];

    const results = {
        A: {
            title: "【極光探險家】✨",
            desc: "<b>冒險路上，你的防禦地基可能還是薄蕾絲。</b><br><br>你對生活充滿夢想，熱愛享受當下。但目前你的「保障安全網」防護力有點單薄。一旦遇到突發的自費醫療，很容易影響到你前進的腳步。別怕！跟著芝心一起健檢「實支實付醫療缺口」，並透過穩定工具打造月月現金流。把你的蕾絲網升級成超強安全防護罩吧！",
            avatar: "🚀🌌",
            bgColor: "#ECEFF1",
            lineMsg: "嗨！芝心～我測出來是【極光探險家】✨ 想跟妳聊聊怎麼檢視我的醫療保障，還有幫自己存出一筆穩定的退休現金流！"
        },
        B: {
            title: "【鋼鐵築路人】🧱",
            desc: "<b>安全感滿分，但要記得幫防護工具「線上更新」！</b><br><br>你非常有風險意識，也有儲蓄和保障的底子。不過隨著現代醫療科技快速進展，許多自費額動輒數十萬起跳，過去規劃的防禦工具可能會不夠用。建議讓芝心幫你進行保障定期微調，補上看不見的隱形缺口，你的財務健康雙地基就會非常完美！",
            avatar: "🧱👷‍♂️",
            bgColor: "#FFE0B2",
            lineMsg: "嗨！芝心～我測出來是【鋼鐵築路人】🧱 想請妳幫我做個財務地基健康檢查，微調我的保障跟退休被動收入！"
        },
        C: {
            title: "【城堡領主】🏰",
            desc: "<b>城堡護城河很深，定期微調升級就能無懈可擊！</b><br><br>太優秀了！你的風險防護與財務觀念都超級棒。身為城堡領主，你的防禦力基本上已經在黃金軌道上。芝心建議你只需要針對最新醫療科技（例如癌症最新精密療法）進行定期小幅微調升級，就能確保你的城堡一輩子穩若泰山！",
            avatar: "🏰👑",
            bgColor: "#D1C4E9",
            lineMsg: "嗨！芝心～我測出來是【城堡領主】🏰 我的保障好像蠻完整的，想找妳幫我做個定期檢視，看看有沒有漏掉最新的醫療保障！"
        }
    };

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        
        const currentNum = currentQuestion + 1;
        document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progress-number').innerText = `${currentNum}/${questions.length}`;
        
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        
        // 渲染對應的粉彩背景與大 Q 版符號
        document.getElementById('quiz-bg').style.backgroundColor = q.bgColor;
        document.getElementById('quiz-avatar').innerText = q.avatar;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                score += opt.score;
                currentQuestion++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let res;
        if (score >= 5) {
            res = results.A;
        } else if (score >= 2) {
            res = results.B;
        } else {
            res = results.C;
        }

        document.getElementById('result-title').innerText = res.title;
        document.getElementById('result-desc').innerHTML = res.desc;
        
        // 渲染結果頁的粉彩背景與大 Q 版符號
        document.getElementById('result-bg').style.backgroundColor = res.bgColor;
        document.getElementById('result-avatar').innerText = res.avatar;
        
        // LINE 導流連結
        const lineID = "@221hssks"; 
        const myLineLink = "https://line.me/R/ti/p/" + lineID + "?text=" + encodeURIComponent(res.lineMsg);
        
        const lineBtn = document.getElementById('line-link');
        lineBtn.href = myLineLink;
    }
</script>

</body>
</html>
