<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <!-- 引入日系清新字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #FAF6F0; /* 溫馨奶油燕麥色 */
            --card-bg: #FFFFFF;
            --text-main: #4A3C31; /* 深焙咖啡色字體，溫柔有質感 */
            --text-sub: #8C7E72;
            --border-color: #F3ECE3;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 16px 40px rgba(140, 126, 114, 0.08);
            padding: 32px 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #EFEAE2;
            position: relative;
            transition: all 0.3s ease;
        }

        /* 頂部標籤：優雅玫瑰金/暖橘漸層 */
        .brand-tag {
            font-size: 0.8rem;
            color: #D47A3B;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            display: inline-block;
            background: linear-gradient(135deg, #FFF5EB, #FFE4D6);
            padding: 6px 18px;
            border-radius: 100px;
            border: 1px solid #FCD4BD;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.5rem; 
            margin-top: 5px; 
            margin-bottom: 24px;
            font-weight: 900;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        /* 
           高感度視覺卡片區：
           採用日系「空氣感」半透明粉彩設計，搭配精緻動態陰影
        */
        .visual-stage {
            width: 100%;
            height: 160px;
            border-radius: 24px;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #FFFBF7, #FFF3E8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 1px solid #F3ECE3;
            box-shadow: inset 0 4px 12px rgba(210, 105, 0, 0.03);
        }

        /* 超大、精緻、帶有懸浮感的Q版意象 */
        .stage-icon {
            font-size: 4.5rem;
            line-height: 1;
            filter: drop-shadow(0 10px 15px rgba(210, 105, 0, 0.15));
            animation: gentleFloat 4s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-6px) scale(1.03); }
            100% { transform: translateY(0px) scale(1); }
        }

        .stage-label {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 10px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* 開始/出發按鈕：質感厚實且具備優雅微動效 */
        .btn {
            background: linear-gradient(135deg, #FFA500, #FF8C00);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 1.05rem;
            border-radius: 100px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: 700;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.2);
            letter-spacing: 1px;
        }
        
        .btn:active { 
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(255, 140, 0, 0.15);
        }

        /* 選擇題選項：日系無壓迫感、輕盈微懸浮 */
        .option-btn {
            background: #FFFFFF;
            color: var(--text-main);
            border: 1px solid #EFEAE2;
            padding: 18px 20px;
            margin: 12px 0;
            width: 100%;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            line-height: 1.5;
            box-sizing: border-box;
            box-shadow: 0 4px 12px rgba(140, 126, 114, 0.03);
        }

        .option-btn:hover, .option-btn:active {
            background-color: #FFFBF7;
            border-color: #FF8C00;
            color: #FF8C00;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 140, 0, 0.08);
        }

        .hidden { display: none; }

        /* 進度條設計：優雅極簡 */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        .progress-bar-bg {
            height: 6px;
            background-color: #F5EFE6;
            border-radius: 100px;
            width: 82%;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFA500, #FF8C00);
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #D47A3B;
            font-weight: 700;
        }

        .intro-text {
            line-height: 1.7;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-top: 5px;
            margin-bottom: 15px;
            text-align: left;
            padding: 0 8px;
        }

        .intro-text b {
            color: #FF8C00;
        }

        /* 結果頁面微調 */
        .result-box {
            text-align: left;
            background: #FFFDFB;
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed #FCD4BD;
            font-size: 0.92rem;
            line-height: 1.7;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 28px;
            border-top: 1px dashed #F3ECE3;
            padding-top: 16px;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- 開始畫面 -->
    <div id="start-screen">
        <span class="brand-tag">🍊 芝心人生夥伴 溫暖企劃</span>
        <h1>安全感防禦人格檢測</h1>
        
        <div class="visual-stage">
            <div class="stage-icon">🏡☀️</div>
            <div class="stage-label">築起你專屬的財務安全感地基</div>
        </div>

        <div class="intro-text">
            日常忙碌的你，曾靜下來感受過自己內心的防禦力嗎？它到底是堅不可摧的溫馨城堡，還是優雅卻單薄的蕾絲防禦網？<br><br>
            <b>芝心</b> 特別規劃了 6 個真實的生活情境，陪你用一分鐘直覺測出專屬的「安全感防禦人格」！
        </div>
        <button class="btn" onclick="startQuiz()">出發檢測！</button>
        <div class="footer-text">© 芝心人生夥伴 | 陪你築起最穩固的財務地基</div>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress-bar-bg"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-number" class="progress-text">1/6</span>
        </div>
        
        <div class="visual-stage">
            <div id="stage-icon" class="stage-icon">❓</div>
            <div id="stage-label" class="stage-label">直覺做出你的選擇</div>
        </div>

        <h3 id="question-text" style="margin-bottom: 20px; line-height: 1.5; font-size: 1.1rem; text-align: left; color: var(--text-main); padding: 0 4px;">載入中...</h3>
        <div id="options-container"></div>
        <div class="footer-text">芝心人生夥伴 溫馨陪伴中...</div>
    </div>

    <!-- 結果畫面 -->
    <div id="result-screen" class="hidden">
        <span class="brand-tag">🍊 芝心人生夥伴 專業分析</span>
        <h2 style="color: var(--text-sub); margin-bottom: 5px; font-size: 1rem; font-weight: 500; letter-spacing: 1px;">你的檢測結果</h2>
        <h1 id="result-title" style="font-size: 1.8rem; margin-top: 5px; margin-bottom: 20px; color: #FF8C00;">計算中...</h1>
        
        <div class="visual-stage">
            <div id="result-icon" class="stage-icon">✨</div>
            <div class="stage-label">診斷報告已生成</div>
        </div>

        <div id="result-desc" class="result-box"></div>
        
        <!-- LINE 導流按鈕 -->
        <a id="line-link" href="#" target="_blank" style="text-decoration: none;">
            <button class="btn" style="background: linear-gradient(135deg, #02b348, #06C755); border: none; box-shadow: 0 8px 20px rgba(6, 199, 85, 0.25);">
                💬 敲「芝心」聊聊我的人格秘密
            </button>
        </a>
        <div class="footer-text">想微調生活保障或聊聊退休被動收入？讓芝心當你最可靠的夥伴</div>
    </div>
</div>

<script>
    // 設計高感度、不冰冷的Q版物件表情組合，確保在任何裝置上均以最高清晰度呈現
    const questions = [
        { 
            q: "Q1. 走在路上不幸踢到鐵板骨折，躺在醫院病床上時，你的大腦第一時間在想...", 
            icon: "🤕🩹",
            label: "健康突發狀況",
            options: [
                { text: "😢 完了，聽說單人房一天要貼好幾千，我還是去睡健保房或走廊好了...", score: 1 }, 
                { text: "😎 沒差，我有保險神隊友！給我來一間陽光灑落的單人房！", score: 0 }
            ] 
        },
        { 
            q: "Q2. 醫生遞過來一張同意書，建議你自費 20 萬做最新型微創手術，你第一眼盯著看的是...", 
            icon: "👨‍⚕️📋",
            label: "醫療科技選擇題",
            options: [
                { text: "😨 那排晃眼的『金額欄』...想問醫生有沒有健保全額給付的傳統手術？", score: 1 }, 
                { text: "💳 當然是『傷口小、恢復快』的說明！反正有實支實付，健康第一！", score: 0 }
            ] 
        },
        { 
            q: "Q3. 剛領完薪水，看著自己戶頭裡那筆「未來教育/買房基金」，你會如何管理它？", 
            icon: "🐷🪙",
            label: "財務地基規劃",
            options: [
                { text: "🏦 放在一般帳戶隨時會被我不小心刷掉，甚至被通膨默默吃掉...", score: 1 }, 
                { text: "🔒 鎖在有穩定增值、強迫儲蓄的年金險或專屬帳戶，誰都別想動它！", score: 0 }
            ] 
        },
        { 
            q: "Q4. 提到「為自己規劃每個月被動收入與退休生活」，你最真實的現狀是...", 
            icon: "🌴🍹",
            label: "未來自由藍圖",
            options: [
                { text: "💭 有打算啦...但每個月卡費和生活開銷扣完，就打算下個月再說了。", score: 1 }, 
                { text: "📈 有在實施中！無論是定期定額還是儲蓄型年金，默默在蓋財務地基！", score: 0 }
            ] 
        },
        { 
            q: "Q5. 突然驚覺身邊好幾個朋友都開始做健康檢查、甚至有人生病，你的反應是...", 
            icon: "🔎📝",
            label: "防禦網定期檢查",
            options: [
                { text: "🫣 鴕鳥心態，不敢看自己的健康和保障，深怕看到赤裸裸的缺口。", score: 1 }, 
                { text: "🛡️ 預防勝於治療，定期把現有保障拉出來健檢，跟上最新醫療水準！", score: 0 }
            ] 
        },
        { 
            q: "Q6. 對於「財務自由」這四個字，你腦海中浮現的終極浪漫畫面是...", 
            icon: "🌻☀️",
            label: "陽光灑落的終點",
            options: [
                { text: "🍟 點麥當勞直接升級大薯，不用看價錢就覺得很爽了！", score: 1 }, 
                { text: "🏡 退休後每個月有一筆「穩定的現金流」自動入帳，天天自然醒！", score: 2 }
            ] 
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        
        const currentNum = currentQuestion + 1;
        document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progress-number').innerText = `${currentNum}/${questions.length}`;
        
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        
        // 渲染對應的情境 Q 版 Emoji 與微標題
        document.getElementById('stage-icon').innerText = q.icon;
        document.getElementById('stage-label').innerText = q.label;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                score += opt.score;
                currentQuestion++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let title = "";
        let desc = "";
        let lineMsg = "";
        let resultIcon = "";

        if (score >= 5) {
            title = "【極光探險家】";
            desc = "<b>探索世界是你的超能力，但保障地基可能還是薄蕾絲。</b><br><br>你對生活充滿期待，活得精彩，但目前的「保障安全網」防護力稍微有些單薄。一旦碰上意外或大筆自費醫療，可能會打亂你前進的步調。別擔心！及早和芝心一起補足「實支實付醫療缺口」，打造未來穩健的月月現金流，探險之路才能玩得更安心無憂！";
            lineMsg = "嗨！芝心～我測出來是【極光探險家】✨ 想跟妳聊聊怎麼檢視我的醫療保障，還有幫自己存出一筆穩定的退休現金流！";
            resultIcon = "🚀🌌";
        } else if (score >= 2) {
            title = "【鋼鐵築路人】";
            desc = "<b>懂得以退為進的你，需要將工具升級為最新版。</b><br><br>你很有風險防範概念，也為未來做了一些準備。但隨著新式醫療科技迅速進展，許多自費額動輒數十萬起跳，過去規劃的防禦工具可能會有些不夠用。建議讓芝心幫你進行保障定期微調，並開始將部分資金轉移至穩健增值的管道，讓你的財務與健康雙地基更加無懈可擊！";
            lineMsg = "嗨！芝心～我測出來是【鋼鐵築路人】🧱 想請妳幫我做個財務地基健康檢查，微調我的保障跟退休被動收入！";
            resultIcon = "🧱👷‍♂️";
        } else {
            title = "【城堡領主】";
            desc = "<b>穩健卓越的城堡，適合定期微調跟上最新科技。</b><br><br>非常優秀！你對資產安全感與個人保障的敏感度極高，防護網也相當深厚完備。身為城堡領主，建議你隨著最新的醫療科技發展（例如昂貴精密治癌新法），定期進行細節微調補強，讓你的城堡防護圈與退休生活永遠維持在最完美的黃金水準！";
            lineMsg = "嗨！芝心～我測出來是【城堡領主】🏰 我的保障好像蠻完整的，想找妳幫我做個定期檢視，看看有沒有漏掉最新的醫療保障！";
            resultIcon = "🏰👑";
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-desc').innerHTML = desc;
        document.getElementById('result-icon').innerText = resultIcon;
        
        // 你的 Line ID：@221hssks
        const lineID = "@221hssks"; 
        const myLineLink = "https://line.me/R/ti/p/" + lineID + "?text=" + encodeURIComponent(lineMsg);
        
        const lineBtn = document.getElementById('line-link');
        lineBtn.href = myLineLink;

        // 統計計數
        lineBtn.onclick = function() {
            fetch('https://api.countapi.xyz/hit/zhixin-insurance-quiz-2026/line_click')
                .then(response => response.json())
                .catch(err => console.log('統計微調'));
        };
    }
</script>

</body>
</html>
