<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #FFFDF9;
            --text-color: #4A4A4A;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid #FFE4B5;
            position: relative;
        }
        .brand-tag {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: inline-block;
            background-color: #FFF0F5;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px dashed var(--secondary-color);
        }
        h1 { color: var(--primary-color); font-size: 1.5rem; margin-top: 5px; margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }
        .btn:active { transform: scale(0.98); }
        .option-btn {
            background: white;
            color: var(--text-color);
            border: 2px solid #FFE4B5;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .option-btn:hover, .option-btn:active {
            background-color: #FFF8DC;
            border-color: var(--primary-color);
        }
        .hidden { display: none; }
        .progress-bar {
            height: 6px;
            background-color: #FFE4B5;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }
        .footer-text {
            font-size: 0.75rem;
            color: #999;
            margin-top: 25px;
            border-top: 1px solid #F5F5F5;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- 開始畫面 -->
    <div id="start-screen">
        <span class="brand-tag">🧡 芝心人生夥伴 溫馨策劃</span>
        <h1>安全感防禦人格檢測</h1>
        <p style="line-height: 1.6; color: #666; font-size: 0.95rem;">
            你對未來的防禦力，到底是防彈衣還是蕾絲防護網？<br>
            <b>芝心</b> 準備了 4 個讓人超有共鳴的生活情境，<br>一分鐘直覺測出你是哪一種「安全感人格」！
        </p>
        <button class="btn" onclick="startQuiz()">出發檢測！</button>
        <div class="footer-text">© 芝心人生夥伴 | 陪你築起最穩固的財務地基</div>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
        <h3 id="question-text" style="margin-bottom: 25px; line-height: 1.5; font-size: 1.1rem; text-align: left; color: #333;">問題載入中...</h3>
        <div id="options-container"></div>
        <div class="footer-text">芝心人生夥伴 溫馨陪伴中...</div>
    </div>

    <!-- 結果畫面 -->
    <div id="result-screen" class="hidden">
        <span class="brand-tag">🧡 芝心人生夥伴 專業分析</span>
        <h2 style="color: var(--primary-color); margin-bottom: 5px; font-size: 1.2rem;">你的檢測結果</h2>
        <h1 id="result-title" style="font-size: 1.8rem; margin-top: 5px; margin-bottom: 15px;">計算中...</h1>
        <p id="result-desc" style="line-height: 1.6; text-align: left; background: #FFFDF9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary-color); font-size: 0.95rem;"></p>
        
        <!-- LINE 導流按鈕 -->
        <a id="line-link" href="#" target="_blank" style="text-decoration: none;">
            <button class="btn" style="background: #06C755; box-shadow: 0 5px 15px rgba(6, 199, 85, 0.3);">
                💬 敲「芝心」聊聊我的人格秘密
            </button>
        </a>
        <div class="footer-text">想微調生活保障或聊聊退休金？讓芝心當你最可靠的隊友</div>
    </div>
</div>

<script>
    // 幽默生活化題目設計
    const questions = [
        { 
            q: "Q1. 走在路上不幸踢到鐵板骨折，躺在醫院病床上時，你的大腦第一時間在想...", 
            options: [
                { text: "😢 完了，聽說單人房一天要貼好幾千，我還是去睡走廊好了...", score: 1 }, 
                { text: "😎 沒差，我有保險神隊友！給我來一間陽光灑落的單人房！", score: 0 }
            ] 
        },
        { 
            q: "Q2. 如果醫生說你要自費 20 萬做最新型科技微創手術，你的直覺反應是...", 
            options: [
                { text: "😨 醫生，請問有沒有那種『傷口雖然很大，但健保全額給付』的復古手術？", score: 1 }, 
                { text: "💳 刷我的卡！反正保險公司事後會幫我買單，身體健康最重要！", score: 0 }
            ] 
        },
        { 
            q: "Q3. 月底看著帳戶裡微薄的餘額，你對「財富自由」的終極幻想是...", 
            options: [
                { text: "🍟 買麥當勞直接升級大薯，而且完全不用看價錢！", score: 1 }, 
                { text: "🌅 60 歲後每個月都有一筆穩定的現金流自動匯進來，天天睡到自然醒！", score: 2 }
            ] 
        },
        { 
            q: "Q4. 關於「為未來準備退休金/被動收入」這件事，你目前的進度是...", 
            options: [
                { text: "💭 有啊，我每天睡覺前都在腦海裡規劃怎麼花那十億威力彩頭獎。", score: 1 }, 
                { text: "📈 有在定期定額或規劃儲蓄/年金險，默默把財務地基蓋起來！", score: 0 }
            ] 
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        
        // 更新進度條
        document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;
        
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                score += opt.score;
                currentQuestion++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let title = "";
        let desc = "";
        let lineMsg = "";

        // 判定為一開始設計的三個人格
        if (score >= 4) {
            title = "【極光探險家】";
            desc = "你對生活充滿夢想，但目前的防禦地基像蕾絲一樣單薄！一旦遇到醫療自費或暫停收入，很容易影響原本的生活水準。別擔心，芝心建議你及早檢視實支實付醫療缺口，並用穩定的工具幫自己打造退休後的被動現金流，跟芝心一起築起最穩固的安全網！";
            lineMsg = "嗨！芝心～我測出來是【極光探險家】，想跟你聊聊我的醫療保障和退休現金流規劃！";
        } else if (score >= 2) {
            title = "【鋼鐵築路人】";
            desc = "你非常有安全意識，也有些許保障底子，但可能手上的防禦工具跟不上現在最新的醫療科技（自費高得嚇人）。面對高額自費醫療或未來退休的被動現金流，可能還有一些小缺口。讓芝心幫你稍微微調一下，你的防禦地基就會非常完美！";
            lineMsg = "嗨！芝心～我測出來是【鋼鐵築路人】，想跟你聊聊怎麼微調我的保障跟退休規劃！";
        } else {
            title = "【城堡領主】";
            desc = "太棒了！你的風險防護與財務觀念非常優異，已經走在安心退休與充分保障的軌道上。芝心建議可以定期檢視現有合約是否跟上最新醫療科技進步，讓你的財務城堡防禦力永遠滿格！";
            lineMsg = "嗨！芝心～我測出來是【城堡領主】，我的保障好像挺完整的，但想找你幫我做個定期檢視！";
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-desc').innerText = desc;
        
        // ⚠️【請將下方 @your_line_id_here 替換成你的 LINE ID 或是官方帳號 ID（有 @ 符號記得加上）】
        const lineID = "@your_line_id_here"; 
        const myLineLink = "https://line.me/R/ti/p/" + lineID + "?text=" + encodeURIComponent(lineMsg);
        
        const lineBtn = document.getElementById('line-link');
        lineBtn.href = myLineLink;

        // 🎯 點擊按鈕時觸發背景計數
        lineBtn.onclick = function() {
            fetch('https://api.countapi.xyz/hit/zhixin-insurance-quiz-2026/line_click')
                .then(response => response.json())
                .then(data => {
                    console.log('當前累計諮詢人數：' + data.value);
                })
                .catch(err => console.log('統計連線微調，但不影響跳轉'));
        };
    }
</script>

</body>
</html>
