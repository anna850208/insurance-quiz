<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #FAF6F0; /* 溫暖奶油色底 */
            --card-bg: #FFFFFF;
            --text-color: #5A4B41; /* 溫柔的深咖啡色文字，具手繪漫畫感 */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 15px 30px rgba(220, 150, 100, 0.1);
            padding: 30px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            border: 3px solid #FFD09B; /* 手繪風厚邊框 */
            position: relative;
            box-sizing: border-box;
        }
        .brand-tag {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: inline-block;
            background-color: #FFF3E0;
            padding: 6px 16px;
            border-radius: 20px;
            border: 2px dashed var(--secondary-color);
        }
        h1 { 
            color: var(--primary-color); 
            font-size: 1.6rem; 
            margin-top: 5px; 
            margin-bottom: 20px;
            font-weight: 800;
        }
        
        /* 視覺插圖區 */
        .illustration-box {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            background-color: #FFFDF9;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 2px solid #FFE4B5;
        }
        .illustration-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 滿版溫馨感 */
            background-color: #FFFDF9;
        }

        .btn {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 18px rgba(255, 140, 0, 0.25);
            border-bottom: 4px solid #D26900; /* 按鈕立體手繪感 */
        }
        .btn:active { 
            transform: scale(0.98); 
            border-bottom-width: 1px;
            margin-top: 18px;
        }
        
        .option-btn {
            background: white;
            color: var(--text-color);
            border: 2px solid #FFE4B5;
            padding: 16px;
            margin: 12px 0;
            width: 100%;
            border-radius: 16px;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            line-height: 1.4;
            box-sizing: border-box;
            box-shadow: 0 4px 0px #FFE4B5;
        }
        .option-btn:hover, .option-btn:active {
            background-color: #FFFDF0;
            border-color: var(--primary-color);
            transform: translateY(2px);
            box-shadow: 0 2px 0px var(--primary-color);
        }
        .hidden { display: none; }
        
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .progress-bar-bg {
            height: 10px;
            background-color: #FFE4B5;
            border-radius: 5px;
            width: 80%;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .footer-text {
            font-size: 0.75rem;
            color: #A08A75;
            margin-top: 25px;
            border-top: 1px dashed #FFE4B5;
            padding-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- 開始畫面 -->
    <div id="start-screen">
        <span class="brand-tag">🧡 芝心人生夥伴 溫馨策劃</span>
        <h1>安全感防禦人格檢測</h1>
        
        <div class="illustration-box">
            <!-- 封面：精緻手繪風溫馨屋子/守護家園插圖 -->
            <img src="https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?auto=format&fit=crop&q=80&w=600" alt="防禦檢測首頁">
        </div>

        <p style="line-height: 1.6; color: #6B5B52; font-size: 0.95rem; margin-top: 5px;">
            你對未來的防禦力，到底是銅牆鐵壁還是蕾絲防護網？<br>
            <b>芝心</b> 精心設計了 6 個生活共鳴情境，<br>一分鐘直覺測出你是哪一種「安全感人格」！
        </p>
        <button class="btn" onclick="startQuiz()">出發檢測！</button>
        <div class="footer-text">© 芝心人生夥伴 | 陪你築起最穩固的財務地基</div>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress-bar-bg"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-number" class="progress-text">1/6</span>
        </div>
        
        <!-- 動態Q版/手繪插圖區 -->
        <div class="illustration-box">
            <img id="question-img" src="" alt="情境圖">
        </div>

        <h3 id="question-text" style="margin-bottom: 20px; line-height: 1.5; font-size: 1.1rem; text-align: left; color: #4A3C31;">載入中...</h3>
        <div id="options-container"></div>
        <div class="footer-text">芝心人生夥伴 溫馨陪伴中...</div>
    </div>

    <!-- 結果畫面 -->
    <div id="result-screen" class="hidden">
        <span class="brand-tag">🧡 芝心人生夥伴 專業分析</span>
        <h2 style="color: var(--primary-color); margin-bottom: 5px; font-size: 1.2rem;">你的檢測結果</h2>
        <h1 id="result-title" style="font-size: 1.8rem; margin-top: 5px; margin-bottom: 15px;">計算中...</h1>
        
        <!-- 結果Q版插圖 -->
        <div class="illustration-box">
            <img id="result-img" src="" alt="結果圖">
        </div>

        <p id="result-desc" style="line-height: 1.6; text-align: left; background: #FFFDF9; padding: 18px; border-radius: 12px; border-left: 5px solid var(--primary-color); font-size: 0.95rem; margin-bottom: 20px;"></p>
        
        <!-- LINE 導流按鈕 -->
        <a id="line-link" href="#" target="_blank" style="text-decoration: none;">
            <button class="btn" style="background: linear-gradient(135deg, #02b348, #06C755); border-bottom: 4px solid #009933; box-shadow: 0 5px 15px rgba(6, 199, 85, 0.3);">
                💬 敲「芝心」聊聊我的人格秘密
            </button>
        </a>
        <div class="footer-text">想微調生活保障或聊聊退休現金流？讓芝心當你最可靠的夥伴</div>
    </div>
</div>

<script>
    // 使用 Unsplash 手繪/插畫風高畫質無防盜連連結，確保完美呈現
    const questions = [
        { 
            q: "Q1. 走在路上不幸踢到鐵板骨折，躺在醫院病床上時，你的大腦第一時間在想...", 
            imgUrl: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&q=80&w=600", // 舒緩、療癒手繪感插圖
            options: [
                { text: "😢 完了，聽說單人房一天要貼好幾千，我還是去睡健保房或走廊好了...", score: 1 }, 
                { text: "😎 沒差，我有保險神隊友！給我來一間陽光灑落的單人房！", score: 0 }
            ] 
        },
        { 
            q: "Q2. 醫生遞過來一張同意書，建議你自費 20 萬做最新型微創手術，你第一眼盯著看的是...", 
            imgUrl: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&q=80&w=600", // 設計與諮詢手繪質感插圖
            options: [
                { text: "😨 那排晃眼的『金額欄』...想問醫生有沒有健保全額給付的傳統手術？", score: 1 }, 
                { text: "💳 當然是『傷口小、恢復快』的說明！反正有實支實付，健康第一！", score: 0 }
            ] 
        },
        { 
            q: "Q3. 剛領完薪水，看著自己戶頭裡那筆「未來教育/買房基金」，你會如何管理它？", 
            imgUrl: "https://images.unsplash.com/photo-1554048612-b6a482bc67e5?auto=format&fit=crop&q=80&w=600", // 存錢/手帳彩繪風格
            options: [
                { text: "🏦 放在一般帳戶隨時會被我不小心刷掉，甚至被通膨默默吃掉...", score: 1 }, 
                { text: "🔒 鎖在有穩定增值、強迫儲蓄的年金險或專屬帳戶，誰都別想動它！", score: 0 }
            ] 
        },
        { 
            q: "Q4. 提到「為自己規劃被動收入/退休生活」這件事，你最真實的現狀是...", 
            imgUrl: "https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&q=80&w=600", // 悠閒午後咖啡/漫畫感咖啡杯
            options: [
                { text: "💭 有打算啦...但每個月卡費和生活開銷扣完，就打算下個月再說了。", score: 1 }, 
                { text: "📈 有在實施中！無論是定期定額還是儲蓄型年金，默默在蓋財務地基！", score: 0 }
            ] 
        },
        { 
            q: "Q5. 突然驚覺身邊好幾個朋友都開始做健康檢查、甚至有人生病，你的反應是...", 
            imgUrl: "https://images.unsplash.com/photo-1484480974693-2ca0a72af3a8?auto=format&fit=crop&q=80&w=600", // 清單 checklist 手繪風插圖
            options: [
                { text: "🫣 鴕鳥心態，不敢看自己的健康和保障，深怕看到赤裸裸的缺口。", score: 1 }, 
                { text: "🛡️ 預防勝於治療，定期把現有保障拉出來健檢，跟上最新醫療水準！", score: 0 }
            ] 
        },
        { 
            q: "Q6. 對於「財務自由」這四個字，你腦海中浮現的終極浪漫畫面是...", 
            imgUrl: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=600", // 清新自然陽光灑落森林插畫風格（呼應你最愛的陽光感！）
            options: [
                { text: "🍟 點麥當勞直接升級大薯，不用看價錢就覺得很爽了！", score: 1 }, 
                { text: "🏡 退休後每個月有一筆「穩定的現金流」自動入帳，天天自然醒！", score: 2 }
            ] 
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        
        const currentNum = currentQuestion + 1;
        document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progress-number').innerText = `${currentNum}/${questions.length}`;
        
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        
        const imgEl = document.getElementById('question-img');
        imgEl.src = q.imgUrl;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                score += opt.score;
                currentQuestion++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let title = "";
        let desc = "";
        let lineMsg = "";
        let resultImg = "";

        if (score >= 5) {
            title = "【極光探險家】";
            desc = "你對生活充滿夢想，熱愛當下，但目前的財務與保障防禦地基就像蕾絲一樣單薄！一旦生活中遇到突發的醫療開支或需要自費時，很容易影響你追求自由的腳步。別擔心！芝心建議你及早健檢「實支實付醫療缺口」，並透過穩定工具打造未來的被動現金流。跟芝心一起動手，把你的蕾絲網升級成超強安全防護網吧！";
            lineMsg = "嗨！芝心～我測出來是【極光探險家】✨ 想跟妳聊聊怎麼檢視我的醫療保障，還有幫自己存出一筆穩定的退休現金流！";
            resultImg = "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=600"; // 太空探險/夢想星空手繪風
        } else if (score >= 2) {
            title = "【鋼鐵築路人】";
            desc = "你非常有安全意識，也有一定的保障底子，懂得為下雨天做準備。不過，現在最新的醫療科技日新月異（很多新型手術和藥物自費額高得嚇人），你手上的防禦工具可能有點「跟不上時代」了。面對高額自費以及未來退休的源源不絕現金流，可能還有一些肉眼看不見的小缺口。讓芝心幫你稍微做個檢診微調，你的財務與保障地基就會非常完美！";
            lineMsg = "嗨！芝心～我測出來是【鋼鐵築路人】🧱 想請妳幫我做個財務地基健康檢查，微調我的保障跟退休被動收入！";
            resultImg = "https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&q=80&w=600"; // 手繪建築/構築地基風格
        } else {
            title = "【城堡領主】";
            desc = "太優秀了！你的風險防護與財務觀念都超級好，基本上已經穩穩走在安心退休與充分保障的黃金軌道上。身為城堡領主，你的護城河已經相當深厚，芝心建議你可以定期做個合約與保障檢視，看看有沒有需要針對最新的醫療科技（例如癌症最新精密療法）進行微幅升級，確保你的城堡防禦力永遠保持在滿格狀態！";
            lineMsg = "嗨！芝心～我測出來是【城堡領主】🏰 我的保障好像蠻完整的，想找妳幫我做個定期檢視，看看有沒有漏掉最新的醫療保障！";
            resultImg = "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&q=80&w=600"; // 精緻手繪城堡建築
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-desc').innerText = desc;
        
        const resImgEl = document.getElementById('result-img');
        resImgEl.src = resultImg;
        
        // LINE 官方帳號 ID：@221hssks
        const lineID = "@221hssks"; 
        const myLineLink = "https://line.me/R/ti/p/" + lineID + "?text=" + encodeURIComponent(lineMsg);
        
        const lineBtn = document.getElementById('line-link');
        lineBtn.href = myLineLink;

        // 點擊計數
        lineBtn.onclick = function() {
            fetch('https://api.countapi.xyz/hit/zhixin-insurance-quiz-2026/line_click')
                .then(response => response.json())
                .catch(err => console.log('統計微調，不影響跳轉'));
        };
    }
</script>

</body>
</html>
