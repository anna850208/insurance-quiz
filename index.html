<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #FAF6F0; /* 溫馨燕麥奶色 */
            --card-bg: #FFFFFF;
            --text-main: #5C4B40; /* 溫暖可可深咖 */
            --text-sub: #A38F80;
            --pastel-orange: #FFEAD8;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 16px 35px rgba(140, 126, 114, 0.08);
            padding: 25px 20px;
            max-width: 450px; 
            width: 100%;
            text-align: center;
            border: 2px solid #EFEAE2;
            position: relative;
        }

        .brand-tag {
            font-size: 0.8rem;
            color: #D47A3B;
            font-weight: 700;
            margin-bottom: 18px;
            display: inline-block;
            background: linear-gradient(135deg, #FFF5EB, #FFE4D6);
            padding: 5px 16px;
            border-radius: 50px;
            border: 1px solid #FCD4BD;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.45rem; 
            margin-top: 5px; 
            margin-bottom: 20px;
            font-weight: 900;
            line-height: 1.4;
        }

        .illustration-stage {
            width: 100%;
            height: 300px; 
            border-radius: 20px;
            margin-bottom: 22px;
            background: #FFFDFC;
            border: 2px dashed #FFD09B;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .custom-img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            padding: 5px; 
            border-radius: 18px;
            transition: all 0.3s ease;
        }

        .btn {
            background: linear-gradient(135deg, #FFB03A, #FF8C00);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.05rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(255, 140, 0, 0.2);
            border-bottom: 4px solid #E06C00;
        }
        
        .btn:active { 
            transform: translateY(3px);
            border-bottom-width: 1px;
            box-shadow: 0 2px 5px rgba(255, 140, 0, 0.1);
        }

        .option-btn {
            background: #FFFFFF;
            color: var(--text-main);
            border: 1.5px solid #EFEAE2;
            padding: 16px 18px;
            margin: 10px 0;
            width: 100%;
            border-radius: 18px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
            line-height: 1.4;
            box-shadow: 0 4px 0px #F5EFE6;
        }

        .option-btn:active, .option-btn:hover {
            background-color: #FFFDF9;
            border-color: #FF8C00;
            color: #FF8C00;
            transform: translateY(2px);
            box-shadow: 0 2px 0px #FF8C00;
        }

        .hidden { display: none; }

        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
        }
        
        .progress-bar-bg {
            height: 8px;
            background-color: #F5EFE6;
            border-radius: 10px;
            width: 80%;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFB870, #FF8C00);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 0.85rem;
            color: #FF8C00;
            font-weight: 700;
        }

        .intro-text {
            line-height: 1.6;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-top: 5px;
            margin-bottom: 15px;
            text-align: left;
            background: #FFFDF9;
            padding: 16px;
            border-radius: 18px;
            border: 1px dashed #FFD09B;
        }

        .result-box {
            text-align: left;
            background: #FFFDFB;
            padding: 18px;
            border-radius: 18px;
            border: 2px dashed #FFD2A6;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .footer-text {
            font-size: 0.72rem;
            color: var(--text-sub);
            margin-top: 25px;
            border-top: 1px dashed #EFEAE2;
            padding-top: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- 開始畫面 -->
    <div id="start-screen">
        <span class="brand-tag">🍊 芝心人生夥伴 療癒企劃</span>
        <h1>安全感防禦人格檢測</h1>
        
        <div class="illustration-stage">
            <!-- 這裡會自動讀取下面設定的開始圖片網址 -->
            <img id="start-img" class="custom-img" src="" alt="開始插圖">
        </div>

        <div class="intro-text">
            嗨！我是你的財務地基診斷師<b>芝心</b> 🍊<br><br>
            你對未來的安全防禦，到底是像銅牆鐵壁一樣讓人安心，還是像精緻的蕾絲一樣一碰就透？<br><br>
            花一分鐘，跟著超療癒的 Q 版插畫卡，測出你專屬的「防禦人格」吧！
        </div>
        <button class="btn" onclick="startQuiz()">出發測驗 🚀</button>
        <div class="footer-text">© 芝心人生夥伴 | 陪你築起最穩固的財務地基</div>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress-bar-bg"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-number" class="progress-text">1/6</span>
        </div>
        
        <div class="illustration-stage">
            <img id="quiz-img" class="custom-img" src="" alt="題目插圖">
        </div>

        <h3 id="question-text" style="margin-bottom: 15px; line-height: 1.5; font-size: 1.05rem; text-align: left; padding: 0 5px;">載入中...</h3>
        <div id="options-container"></div>
        <div class="footer-text">芝心陪著你，別緊張唷 🍊</div>
    </div>

    <!-- 結果畫面 -->
    <div id="result-screen" class="hidden">
        <span class="brand-tag">🍊 芝心人生夥伴 診斷報告</span>
        <h2 style="color: var(--text-sub); margin-bottom: 5px; font-size: 0.9rem; font-weight: 500;">你專屬的防禦人格是</h2>
        <h1 id="result-title" style="font-size: 1.8rem; margin-top: 5px; margin-bottom: 15px; color: #FF8C00;">計算中...</h1>
        
        <div class="illustration-stage">
            <img id="result-img" class="custom-img" src="" alt="結果插圖">
        </div>

        <div id="result-desc" class="result-box"></div>
        
        <button class="btn" onclick="redirectToLine()" style="background: linear-gradient(135deg, #02b348, #06C755); border-bottom: 4px solid #009933; box-shadow: 0 6px 15px rgba(6, 199, 85, 0.25);">
            💬 敲「芝心」聊聊我的人格秘密
        </button>
        <div class="footer-text">想微調保障或聊聊月月被動收入？找芝心就對啦！</div>
    </div>
</div>

<script>
    // ==========================================
    // 🍊 圖片網址替換區
    // 請把後面的 "你的圖片網址.png" 換成上傳後的真正網址
    // ==========================================
    const imageUrls = {
        start: "你的開始畫面圖片網址.png",
        q1: "你的題目1圖片網址.png",
        q2: "你的題目2圖片網址.png",
        q3: "你的題目3圖片網址.png",
        q4: "你的題目4圖片網址.png",
        q5: "你的題目5圖片網址.png",
        q6: "你的題目6圖片網址.png",
        r1: "你的結果A圖片網址.png",
        r2: "你的結果B圖片網址.png",
        r3: "你的結果C圖片網址.png"
    };

    // 初始化開始畫面圖片
    document.getElementById('start-img').src = imageUrls.start;

    const questions = [
        {
            question: "1. 當突然收到一筆意料之外的緊急支出帳單（例如修車或醫藥費），你的第一反應是？",
            imgKey: "q1",
            options: [
                { text: "完全不擔心，我有準備好絕對充足的緊急預備金。", type: "A" },
                { text: "雖然有點心痛，但調整一下本月的娛樂開銷還過得去。", type: "B" },
                { text: "瞬間壓力爆表，可能需要動用到信用卡分期或向人求助。", type: "C" }
            ]
        },
        {
            question: "2. 關於自己的醫療與意外保障，你的了解程度是？",
            imgKey: "q2",
            options: [
                { text: "非常清楚！每年固定盤點，連細節理賠額度都倒背如流。", type: "A" },
                { text: "有買基本險種，大方向知道有保什麼，但細節不太確定。", type: "B" },
                { text: "不太清楚，當初人情保或家人處理的，很久沒看了。", type: "C" }
            ]
        },
        {
            question: "3. 面對目前的日常開銷與未來的財務規劃，你通常怎麼理財？",
            imgKey: "q3",
            options: [
                { text: "嚴格執行記帳與配置，每月雷打不動先存下固定比例。", type: "A" },
                { text: "有大致的儲蓄概念，剩下的錢才會拿來自由花費。", type: "B" },
                { text: "活在當下，賺多少花多少，理財計畫常卡在第一步。", type: "C" }
            ]
        },
        {
            question: "4. 如果聊到「老後退休生活」或「長期被動收入」，你的想法是？",
            imgKey: "q4",
            options: [
                { text: "已經開始透過工具打造月月現金流，防患於未然。", type: "A" },
                { text: "有想過，但覺得還早，打算過幾年再來認真規劃。", type: "B" },
                { text: "不敢想像，現在的薪水光應付眼前生活就很吃力了。", type: "C" }
            ]
        },
        {
            question: "5. 聽到身邊有朋友突然生大病或發生意外時，你內心第一個念頭通常是？",
            imgKey: "q5",
            options: [
                { text: "幸好我自己的保障做得很足，不用擔心這種萬一。", type: "A" },
                { text: "會有點緊張，心想是不是該把自己的保單翻出來檢查一下？", type: "B" },
                { text: "覺得很遺憾，但默默祈禱自己不會這麼倒楣。", type: "C" }
            ]
        },
        {
            question: "6. 你理想中的財務與生活狀態，最接近以下哪一種感覺？",
            imgKey: "q6",
            options: [
                { text: "萬無一失的絕對掌控感，做任何事都有底氣。", type: "A" },
                { text: "隨遇而安的平衡感，既能享受當下又能兼顧未來。", type: "B" },
                { text: "自由自在不受約束，船到橋頭自然直。", type: "C" }
            ]
        }
    ];

    const results = {
        A: {
            title: "堡壘級｜銅牆鐵壁型",
            imgKey: "r1",
            desc: "<b>安全感指數：★★★★★</b><br><br>你就像一座堅固的城堡，防禦力驚人！對於風險與財務，你習慣提前做好萬全準備。不過有時候繃得太緊也容易累，適度放鬆、或透過更聰明的配置打造月月被動收入，能讓你的地基不只穩固，還能長出漂亮的花園唷！"
        },
        B: {
            title: "平衡級｜彈性減震型",
            imgKey: "r2",
            desc: "<b>安全感指數：★★★☆☆</b><br><br>你擁有很棒的適應力，像氣墊一樣具備基礎的防護與緩衝能力。面對小風小浪可以輕鬆應付，但如果遇到大環境的劇烈波動，目前的防禦可能稍顯吃力。建議跟芝心一起做個微調盤點，把地基打得更深更穩！"
        },
        C: {
            title: "輕薄級｜精緻蕾絲型",
            imgKey: "r3",
            desc: "<b>安全感指數：★☆☆☆☆</b><br><br>你看起來生活得自由精彩，但在財務保障上，目前推測防禦力就像精緻的蕾絲一樣——美麗卻經不起用力一碰。現在的你需要的是從最基礎的防禦開始蓋起。別擔心！找芝心一步步把漏洞補上，你也能擁有滿滿的安心感！"
        }
    };

    let currentQuestionIndex = 0;
    let scores = { A: 0, B: 0, C: 0 };

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const currentQuestion = questions[currentQuestionIndex];
        
        const progressPercent = ((currentQuestionIndex + 1) / questions.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;
        document.getElementById('progress-number').innerText = `${currentQuestionIndex + 1}/${questions.length}`;
        
        document.getElementById('question-text').innerText = currentQuestion.question;
        document.getElementById('quiz-img').src = imageUrls[currentQuestion.imgKey];
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        currentQuestion.options.forEach(option => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = option.text;
            button.onclick = () => selectOption(option.type);
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(type) {
        scores[type]++;
        currentQuestionIndex++;
        
        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let highestType = 'B';
        let maxScore = -1;
        for (const type in scores) {
            if (scores[type] > maxScore) {
                maxScore = scores[type];
                highestType = type;
            }
        }
        
        const result = results[highestType];
        document.getElementById('result-title').innerText = result.title;
        document.getElementById('result-img').src = imageUrls[result.imgKey];
        document.getElementById('result-desc').innerHTML = result.desc;
    }

    function redirectToLine() {
        window.location.href = "https://line.me/R/ti/p/@221hssks";
    }
</script>
</body>
</html>
