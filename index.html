<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #F7F4EF; /* 日系極簡燕麥色 */
            --card-bg: #FFFFFF;
            --text-color: #4A3E3D; /* 溫柔的碳灰色 */
            --accent-color: #E8D3C4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(74, 62, 61, 0.05);
            padding: 25px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid #E8E2D9;
            position: relative;
            box-sizing: border-box;
        }
        .brand-tag {
            font-size: 0.8rem;
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: inline-block;
            background-color: #FFF5EB;
            padding: 4px 14px;
            border-radius: 12px;
            border: 1px solid #FFDAB9;
        }
        h1 { 
            color: var(--text-color); 
            font-size: 1.5rem; 
            margin-top: 5px; 
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        /* 溫青日系插畫外框 */
        .illustration-box {
            width: 100%;
            height: 220px;
            border-radius: 16px;
            margin-bottom: 22px;
            overflow: hidden;
            background-color: #FDFDFD;
            border: 1px solid #EAE5DD;
            position: relative;
        }
        .illustration-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片完美填滿且不變形 */
        }

        .btn {
            background: #FF8C00;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .btn:active { 
            transform: scale(0.98); 
            background: #E07B00;
        }
        
        .option-btn {
            background: white;
            color: var(--text-color);
            border: 1.5px solid #E2DCD5;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            border-radius: 12px;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s ease;
            line-height: 1.4;
            box-sizing: border-box;
        }
        .option-btn:hover, .option-btn:active {
            background-color: #FAF6F0;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .hidden { display: none; }
        
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .progress-bar-bg {
            height: 6px;
            background-color: #EAE5DD;
            border-radius: 3px;
            width: 80%;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #8C7E72;
            font-weight: bold;
        }
        
        .footer-text {
            font-size: 0.75rem;
            color: #9C8E82;
            margin-top: 25px;
            border-top: 1px solid #EAE5DD;
            padding-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="start-screen">
        <span class="brand-tag">🍊 芝心人生夥伴 溫暖企劃</span>
        <h1>安全感防禦人格檢測</h1>
        
        <div class="illustration-box">
            <img src="https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?auto=format&fit=crop&q=80&w=600" alt="防禦檢測首頁">
        </div>

        <p style="line-height: 1.6; color: #6E6259; font-size: 0.92rem; margin-top: 5px; text-align: left; padding: 0 10px;">
            生活總有些意外，有些人的防禦力是厚實城堡，有些人則是優雅的蕾絲防護網。<br><br>
            <b>芝心</b> 準備了 6 個最真實、最有共鳴的生活選擇。讓我們花一分鐘，看看你的保障「安全感」到底及不及格？
        </p>
        <button class="btn" onclick="startQuiz()">開始檢測</button>
        <div class="footer-text">© 芝心人生夥伴 | 陪你築起最穩固的財務地基</div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress-bar-bg"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-number" class="progress-text">1/6</span>
        </div>
        
        <div class="illustration-box">
            <img id="question-img" src="" alt="情境圖">
        </div>

        <h3 id="question-text" style="margin-bottom: 15px; line-height: 1.5; font-size: 1.05rem; text-align: left; color: #3A2E2B;">載入中...</h3>
        <div id="options-container"></div>
        <div class="footer-text">芝心人生夥伴 溫馨陪伴中...</div>
    </div>

    <div id="result-screen" class="hidden">
        <span class="brand-tag">🍊 芝心人生夥伴 專業分析</span>
        <h2 style="color: #8C7E72; margin-bottom: 5px; font-size: 1.1rem; letter-spacing: 1px;">你的檢測結果</h2>
        <h1 id="result-title" style="font-size: 1.8rem; margin-top: 5px; margin-bottom: 15px; color: var(--primary-color);">計算中...</h1>
        
        <div class="illustration-box">
            <img id="result-img" src="" alt="結果圖">
        </div>

        <p id="result-desc" style="line-height: 1.6; text-align: left; background: #FAF8F5; padding: 18px; border-radius: 12px; border-left: 5px solid var(--primary-color); font-size: 0.92rem; margin-bottom: 20px; color: #5E5048;"></p>
        
        <a id="line-link" href="#" target="_blank" style="text-decoration: none;">
            <button class="btn" style="background: #06C755; border: none; box-shadow: 0 4px 12px rgba(6, 199, 85, 0.2);">
                💬 敲「芝心」聊聊我的人格秘密
            </button>
        </a>
        <div class="footer-text">想微調生活保障或聊聊被動收入？讓芝心當你最可靠的夥伴</div>
    </div>
</div>

<script>
    // 嚴選「100%可外連、不破圖」且畫風極具文青共鳴感的日系/極簡風格影像
    const questions = [
        { 
            q: "Q1. 假如不小心骨折躺在醫院，看著雙人房旁邊傳來的打呼聲，你的內心戲是...", 
            imgUrl: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&q=80&w=600", // 乾淨簡約的醫療諮詢/舒緩視覺
            options: [
                { text: "😢 雖然很吵，但自費單人房一天要多貼好幾千，我還是默默戴上耳塞吧...", score: 1 }, 
                { text: "😎 幸好有規劃醫療險！沒在跟它客氣，立刻申請入住陽光灑落的單人房！", score: 0 }
            ] 
        },
        { 
            q: "Q2. 當醫生建議自費 20 萬採用傷口小、恢復快的微創手術時，你的第一直覺是...", 
            imgUrl: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&q=80&w=600", // 質感鋼筆與文件（代表合約與同意書）
            options: [
                { text: "😰 20 萬...？請問醫生有沒有那種『傷口比較大，但健保全給付』的復古手術？", score: 1 }, 
                { text: "💳 保命要緊！既然有規劃實支實付，當然選對身體最好的科技新技術！", score: 0 }
            ] 
        },
        { 
            q: "Q3. 剛領完薪水，看著自己辛苦存下的一筆「買房/教育預備金」，你會怎麼打理它？", 
            imgUrl: "https://images.unsplash.com/photo-1554048612-b6a482bc67e5?auto=format&fit=crop&q=80&w=600", // 溫柔簡約的手帳與記事本
            options: [
                { text: "🏦 放在一般活存，但老實說，常常不小心手滑就被自己轉出去花掉了...", score: 1 }, 
                { text: "🔒 放在會安全增值且不能亂動的專屬帳戶，強迫自己把地基蓋得穩穩的！", score: 0 }
            ] 
        },
        { 
            q: "Q4. 靜下來思考「退休生活」或「未來每個月的被動收入」時，你目前的進度是...", 
            imgUrl: "https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&q=80&w=600", // 日系慵懶午後咖啡
            options: [
                { text: "💭 有想過，但每個月生活開銷扣完就沒了，總覺得那是『以後的事』。", score: 1 }, 
                { text: "📈 已經在執行了！定期定額或利用年金險，默默在為未來的自己準備零花錢！", score: 0 }
            ] 
        },
        { 
            q: "Q5. 看到身邊同齡朋友健檢紅字、甚至突然生病，你對自己的生活防護網是...", 
            imgUrl: "https://images.unsplash.com/photo-1484480974693-2ca0a72af3a8?auto=format&fit=crop&q=80&w=600", // 文青風手繪 Check list
            options: [
                { text: "🫣 有點鴕鳥心態，不敢看健檢結果，也從來沒仔細算過自己到底保了什麼。", score: 1 }, 
                { text: "🛡️ 預防勝於治療！定期找專業夥伴檢視缺口，確保自己的保障跟得上醫療進步！", score: 0 }
            ] 
        },
        { 
            q: "Q6. 當談到「財務自由」，哪一個才是最讓你感到安心的畫面？", 
            imgUrl: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=600", // 溫暖自然陽光灑落的樹林（呼應溫暖 bright 的氛圍）
            options: [
                { text: "🍟 買東西、點餐可以不用看價格，直接升級套餐，這樣就覺得很治癒了！", score: 1 }, 
                { text: "🏡 退休後每個月都有一筆「穩定的現金流」自動入帳，不用為生活妥協！", score: 2 }
            ] 
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        
        const currentNum = currentQuestion + 1;
        document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progress-number').innerText = `${currentNum}/${questions.length}`;
        
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        
        const imgEl = document.getElementById('question-img');
        imgEl.src = q.imgUrl;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                score += opt.score;
                currentQuestion++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let title = "";
        let desc = "";
        let lineMsg = "";
        let resultImg = "";

        if (score >= 5) {
            title = "【極光探險家】";
            desc = "你對生活充滿夢想與活力，熱愛當下，但不得不說，你目前的「財務防禦地基」就像精緻的蕾絲一樣單薄！一旦生活中遇到突發的自費醫療開支，或是工作收入不小心按下了暫停鍵，很容易就會動搖到你原本追求的自由與生活品質。別擔心！芝心建議你及早檢核自己的「實支實付醫療缺口」，並開始規劃穩健的退休被動現金流。跟芝心一起動手，把蕾絲升級成最安心的防護網吧！";
            lineMsg = "嗨！芝心～我測出來是【極光探險家】✨ 想跟妳聊聊怎麼檢視我的醫療保障，還有幫自己存出一筆穩定的退休現金流！";
            resultImg = "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=600"; // 浩瀚星空（極光與夢想意象）
        } else if (score >= 2) {
            title = "【鋼鐵築路人】";
            desc = "你非常有安全意識，也有一定的防禦底子，懂得「未雨綢繆」的道理。不過，現在的醫療科技和新型手術發展得太快，很多新藥物、微創手術自費動輒數十萬起跳，你手上的保障可能有點「跟不上時代」了。在面對高額自費以及退休後的現金流需求時，你的防禦牆可能還有一些肉眼看不見的小缺口。讓芝心幫你稍微做個地基健診與微調，保障就會非常完美！";
            lineMsg = "嗨！芝心～我測出來是【鋼鐵築路人】🧱 想請妳幫我做個財務地基健康檢查，微調我的保障跟退休被動收入！";
            resultImg = "https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&q=80&w=600"; // 手作質感、構建地基意象
        } else {
            title = "【城堡領主】";
            desc = "太優秀了！你的風險防禦觀念和財務觀點堪稱模範，基本上已經穩穩地走在安心生活與充分保障的黃金軌道上。身為城堡領主，你的護城河已經相當深厚。芝心建議你，接下來可以定期做合約檢視，看看是否需要針對最新型的醫療科技（例如高昂精準醫療、防癌新科技）進行微幅補強，確保這座財富城堡永遠無懈可擊！";
            lineMsg = "嗨！芝心～我測出來是【城堡領主】🏰 我的保障好像蠻完整的，想找妳幫我做個定期檢視，看看有沒有漏掉最新的醫療保障！";
            resultImg = "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&q=80&w=600"; // 高級精緻的城堡線條建築
        }

        document.getElementById('result-title').innerText = title;
        document.getElementById('result-desc').innerText = desc;
        
        const resImgEl = document.getElementById('result-img');
        resImgEl.src = resultImg;
        
        // 你的 Line ID：@221hssks
        const lineID = "@221hssks"; 
        const myLineLink = "https://line.me/R/ti/p/" + lineID + "?text=" + encodeURIComponent(lineMsg);
        
        const lineBtn = document.getElementById('line-link');
        lineBtn.href = myLineLink;

        // 點擊計數
        lineBtn.onclick = function() {
            fetch('https://api.countapi.xyz/hit/zhixin-insurance-quiz-2026/line_click')
                .then(response => response.json())
                .catch(err => console.log('統計微調'));
        };
    }
</script>

</body>
</html>
