<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #FAF6F0; /* 溫馨奶油燕麥色 */
            --card-bg: #FFFFFF;
            --text-color: #5A4B41; /* 溫柔的手繪深咖啡字 */
            --light-orange: #FFF5EB;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .card {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 12px 25px rgba(220, 150, 100, 0.08);
            padding: 25px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 3px solid #FFD09B; /* 手繪風厚邊框 */
            position: relative;
            box-sizing: border-box;
        }
        .brand-tag {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
            background-color: var(--light-orange);
            padding: 5px 14px;
            border-radius: 20px;
            border: 2px dashed var(--secondary-color);
        }
        h1 { 
            color: var(--primary-color); 
            font-size: 1.5rem; 
            margin-top: 5px; 
            margin-bottom: 15px;
            font-weight: 800;
        }
        
        /* 溫馨日系 Q 版插畫卡片區 */
        .illustration-box {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            margin-bottom: 20px;
            background: #FFFDF9;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 2px solid #FFD09B;
            box-shadow: inset 0 0 12px rgba(255, 140, 0, 0.05);
            overflow: hidden;
        }
        .illustration-box svg {
            width: 100%;
            height: 100%;
            max-height: 160px;
        }

        .btn {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.05rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.2);
            border-bottom: 4px solid #D26900;
        }
        .btn:active { 
            transform: scale(0.98); 
            border-bottom-width: 1px;
            margin-top: 18px;
        }
        
        .option-btn {
            background: white;
            color: var(--text-color);
            border: 2px solid #FFE4B5;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            border-radius: 16px;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            line-height: 1.4;
            box-sizing: border-box;
            box-shadow: 0 4px 0px #FFE4B5;
        }
        .option-btn:hover, .option-btn:active {
            background-color: #FFFDF0;
            border-color: var(--primary-color);
            transform: translateY(2px);
            box-shadow: 0 2px 0px var(--primary-color);
        }
        .hidden { display: none; }
        
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .progress-bar-bg {
            height: 8px;
            background-color: #FFE4B5;
            border-radius: 4px;
            width: 80%;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .footer-text {
            font-size: 0.75rem;
            color: #A08A75;
            margin-top: 25px;
            border-top: 1px dashed #FFE4B5;
            padding-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>

    <!-- 結果畫面 -->

        <p id="result-desc" style="line-height: 1.6; text-align: left; background: #FFFDF9; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary-color); font-size: 0.92rem; margin-bottom: 20px;"></p>

            <button class="btn" style="background: linear-gradient(135deg, #02b348, #06C755); border-bottom: 4px solid #009933; box-shadow: 0 5px 15px rgba(6, 199, 85, 0.3);">

        <div class="footer-text">想微調生活保障或聊聊退休現金流？讓芝心當你最可靠的夥伴</div>

</div>

             </svg>`, // Q4：陽光下午茶/悠閒咖啡椅 Q 版意象
        q5: `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <rect x="60" y="30" width="80" height="65" fill="#FFFFFF" stroke="#FFD09B" stroke-width="3" rx="6"/>

        q6: `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">

                <path d="M 78 50 L 62 50" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
                <path d="M 122 50 L 138 50" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
                <!-- 可愛向日葵花瓣與笑臉 -->
                <circle cx="100" cy="50" r="14" fill="#FFA500"/>
                <circle cx="95" cy="46" r="2" fill="#FFFFFF"/>

        resultA: `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <!-- 極光探險家：星空、熱氣球/火箭冒險 -->
                <circle cx="150" cy="40" r="15" fill="#FFEAD2" opacity="0.6"/>

        resultB: `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">

                <rect x="85" y="70" width="30" height="15" fill="#FFD09B" rx="3" stroke="#D26900" stroke-width="2"/>

                <rect x="102" y="52" width="30" height="15" fill="#FF8C00" rx="3" stroke="#D26900" stroke-width="2"/>

        resultC: `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <!-- 城堡領主：Q版可愛小城堡 -->
                <rect x="60" y="55" width="80" height="40" fill="#FFF3E0" stroke="#FFD09B" stroke-width="3"/>

                <circle cx="100" cy="45" r="8" fill="#FFA500"/>
                <text x="96" y="49" font-size="10">👑</text>
             </svg>`
    };

    const questions = [
        { 
            q: "Q1. 走在路上不幸踢到鐵板骨折，躺在醫院病床上時，你的大腦第一時間在想...", 
            svgKey: "q1",
            options: [
                { text: "😢 完了，聽說單人房一天要貼好幾千，我還是去睡健保房或走廊好了...", score: 1 }, 
                { text: "😎 沒差，我有保險神隊友！給我來一間陽光灑落的單人房！", score: 0 }
            ] 
        },
        { 
            q: "Q2. 醫生遞過來一張同意書，建議你自費 20 萬做最新型微創手術，你第一眼盯著看的是...", 
            svgKey: "q2",
            options: [
                { text: "😨 那排晃眼的『金額欄』...想問醫生有沒有健保全額給付的傳統手術？", score: 1 }, 
                { text: "💳 當然是『傷口小、恢復快』的說明！反正有實支實付，健康第一！", score: 0 }
            ] 
        },
        { 
            q: "Q3. 剛領完薪水，看著自己戶頭裡那筆「未來教育/買房基金」，你會如何管理它？", 
            svgKey: "q3",
            options: [
                { text: "🏦 放在一般帳戶隨時會被我不小心刷掉，甚至被通膨默默吃掉...", score: 1 }, 
                { text: "🔒 鎖在有穩定增值、強迫儲蓄的年金險或專屬帳戶，誰都別想動它！", score: 0 }
            ] 
        },
        { 
            q: "Q4. 提到「為自己規劃被動收入/退休生活」這件事，你最真實的現狀是...", 
            svgKey: "q4",
            options: [
                { text: "💭 有打算啦...但每個月卡費和生活開銷扣完，就打算下個月再說了。", score: 1 },

        { 
            q: "Q5. 突然驚覺身邊好幾個朋友都開始做健康檢查、甚至有人生病，你的反應是...", 
            svgKey: "q5",
            options: [
                { text: "🫣 鴕鳥心態，不敢看自己的健康和保障，深怕看到赤裸裸的缺口。", score: 1 }, 
                { text: "🛡️ 預防勝於治療，定期把現有保障拉出來健檢，跟上最新醫療水準！", score: 0 }
            ] 
        },
        { 
            q: "Q6. 對於「財務自由」這四個字，你腦海中浮現的終極浪漫畫面是...", 
            svgKey: "q6",
            options: [
                { text: "🍟 點麥當勞直接升級大薯，不用看價錢就覺得很爽了！", score: 1 }, 
                { text: "🏡 退休後每個月有一筆「穩定的現金流」自動入帳，天天自然醒！", score: 2 }
            ] 
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        
        const currentNum = currentQuestion + 1;
        document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progress-number').innerText = `${currentNum}/${questions.length}`;
        
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.q;
        
        // 切換對應的 Q 版手繪 SVG 插畫
        document.getElementById('question-illustration').innerHTML = svgs[q.svgKey];
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                score += opt.score;
                currentQuestion++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let title = "";
        let desc = "";
        let lineMsg = "";
        let resultSvg = "";

        if (score >= 5) {
            title = "【極光探險家】";
