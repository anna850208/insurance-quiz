<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝心人生夥伴｜一分鐘財務與保障安全感觀測站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF8C00;
            --secondary-color: #FFA500;
            --bg-color: #FAF6F0; /* 溫馨燕麥奶色 */
            --card-bg: #FFFFFF;
            --text-main: #5C4B40; /* 溫暖可可深咖 */
            --text-sub: #A38F80;
            --pastel-orange: #FFEAD8;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 16px 35px rgba(140, 126, 114, 0.08);
            padding: 25px 20px;
            max-width: 450px; /* 稍微放寬卡片，讓整體更大器 */
            width: 100%;
            text-align: center;
            border: 2px solid #EFEAE2;
            position: relative;
        }

        /* 頂部質感小標籤 */
        .brand-tag {
            font-size: 0.8rem;
            color: #D47A3B;
            font-weight: 700;
            margin-bottom: 18px;
            display: inline-block;
            background: linear-gradient(135deg, #FFF5EB, #FFE4D6);
            padding: 5px 16px;
            border-radius: 50px;
            border: 1px solid #FCD4BD;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.45rem; 
            margin-top: 5px; 
            margin-bottom: 20px;
            font-weight: 900;
            line-height: 1.4;
        }

        /* 放大插畫舞台與圖片 */
        .illustration-stage {
            width: 100%;
            height: 300px; /* 從原本的 220px 放大到 300px */
            border-radius: 20px;
            margin-bottom: 22px;
            background: #FFFDFC;
            border: 2px dashed #FFD09B;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .custom-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 確保你的插圖完整呈現、不被切邊 */
            padding: 5px; /* 減少內縮，讓圖片顯示比例更大 */
            border-radius: 18px;
            transition: all 0.3s ease;
        }

        /* Q版圓滾滾按鈕 */
        .btn {
            background: linear-gradient(135deg, #FFB03A, #FF8C00);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.05rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(255, 140, 0, 0.2);
            border-bottom: 4px solid #E06C00;
        }
        
        .btn:active { 
            transform: translateY(3px);
            border-bottom-width: 1px;
            box-shadow: 0 2px 5px rgba(255, 140, 0, 0.1);
        }

        /* 可愛手帳感選項 */
        .option-btn {
            background: #FFFFFF;
            color: var(--text-main);
            border: 1.5px solid #EFEAE2;
            padding: 16px 18px;
            margin: 10px 0;
            width: 100%;
            border-radius: 18px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
            line-height: 1.4;
            box-shadow: 0 4px 0px #F5EFE6;
        }

        .option-btn:active, .option-btn:hover {
            background-color: #FFFDF9;
            border-color: #FF8C00;
            color: #FF8C00;
            transform: translateY(2px);
            box-shadow: 0 2px 0px #FF8C00;
        }

        .hidden { display: none; }

        /* 進度條 */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 5px;
        }
        .progress-bar-bg {
            height: 8px;
            background-color: #F5EFE6;
            border-radius: 10px;
            width: 80%;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFB870, #FF8C00);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #FF8C00;
            font-weight: 700;
        }

        .intro-text {
            line-height: 1.6;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-top: 5px;
            margin-bottom: 15px;
            text-align: left;
            background: #FFFDF9;
            padding: 16px;
            border-radius: 18px;
            border: 1px dashed #FFD09B;
        }

        .result-box {
            text-align: left;
            background: #FFFDFB;
            padding: 18px;
            border-radius: 18px;
            border: 2px dashed #FFD2A6;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .footer-text {
            font-size: 0.72rem;
            color: var(--text-sub);
            margin-top: 25px;
            border-top: 1px dashed #EFEAE2;
            padding-top: 15px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="start-screen">
        <span class="brand-tag">🍊 芝心人生夥伴 療癒企劃</span>
        <h1>安全感防禦人格檢測</h1>
        
        <div class="illustration-stage">
            <img id="start-img" class="custom-img" src="" alt="開始插圖">
        </div>

        <div class="intro-text">
            嗨！我是你的財務地基診斷師<b>芝心</b> 🍊<br><br>
            你對未來的安全防禦，到底是像銅牆鐵壁一樣讓人安心，還是像精緻的蕾絲一樣一碰就透？<br><br>
            花一分鐘，跟著超療癒的 Q 版插畫卡，測出你專屬的「防禦人格」吧！
        </div>
        <button class="btn" onclick="startQuiz()">出發測驗 🚀</button>
        <div class="footer-text">© 芝心人生夥伴 | 陪你築起最穩固的財務地基</div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress-bar-bg"><div id="progress" class="progress-fill"></div></div>
            <span id="progress-number" class="progress-text">1/6</span>
        </div>
        
        <div class="illustration-stage">
            <img id="quiz-img" class="custom-img" src="" alt="題目插圖">
        </div>

        <h3 id="question-text" style="margin-bottom: 15px; line-height: 1.5; font-size: 1.05rem; text-align: left; padding: 0 5px;">載入中...</h3>
        <div id="options-container"></div>
        <div class="footer-text">芝心陪著你，別緊張唷 🍊</div>
    </div>

    <div id="result-screen" class="hidden">
        <span class="brand-tag">🍊 芝心人生夥伴 診斷報告</span>
        <h2 style="color: var(--text-sub); margin-bottom: 5px; font-size: 0.9rem; font-weight: 500;">你專屬的防禦人格是</h2>
        <h1 id="result-title" style="font-size: 1.8rem; margin-top: 5px; margin-bottom: 15px; color: #FF8C00;">計算中...</h1>
        
        <div class="illustration-stage">
            <img id="result-img" class="custom-img" src="" alt="結果插圖">
        </div>

        <div id="result-desc" class="result-box"></div>
        
        <button class="btn" onclick="redirectToLine()" style="background: linear-gradient(135deg, #02b348, #06C755); border-bottom: 4px solid #009933; box-shadow: 0 6px 15px rgba(6, 199, 85, 0.25);">
            💬 敲「芝心」聊聊我的人格秘密
        </button>
        <div class="footer-text">想微調保障或聊聊月月被動收入？找芝心就對啦！</div>
    </div>
</div>
